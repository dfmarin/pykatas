{% extends "base.html" %}
{% block title %}500 — Server Error{% endblock %}

{% block content %}
<div style="
  min-height: calc(100vh - var(--nav-h));
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  text-align: center;
">
  <div>
    <p style="
      font-family: var(--font-display);
      font-size: clamp(6rem, 20vw, 14rem);
      line-height: 1;
      color: var(--surface-3);
      letter-spacing: 0.05em;
      user-select: none;
    ">500</p>

    <h1 style="
      font-family: var(--font-display);
      font-size: 1.8rem;
      letter-spacing: 0.06em;
      color: var(--text);
      margin-top: -1rem;
      margin-bottom: 0.75rem;
    ">Internal Server Error</h1>

    <p style="color: var(--text-2); font-size: 0.83rem; margin-bottom: 0.5rem; max-width: 380px;">
      Something went wrong on our end. The error has been logged.
    </p>
    <p style="
      font-family: var(--font-code);
      font-size: 0.72rem;
      color: var(--text-3);
      margin-bottom: 2rem;
    ">{{ error_id if error_id else '' }}</p>

    <div style="display:flex; gap:0.75rem; justify-content:center; flex-wrap:wrap;">
      <a href="{{ url_for('web.index') }}" class="btn btn--primary">← Back to Katas</a>
      <button onclick="location.reload()" class="btn">Retry</button>
    </div>
  </div>
</div>
{% endblock %}
